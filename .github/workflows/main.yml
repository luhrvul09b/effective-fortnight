name: SSH-WS Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  sshws:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Install Packages
      run: |
        sudo apt update -y
        sudo apt install -y openssh-server curl wget python3 python3-pip autossh
        sudo pip3 install websockify --break-system-packages
        WS=$(which websockify || find / -name websockify 2>/dev/null | head -1)
        echo "websockify path: $WS"
        test -n "$WS" && echo "websockify OK" || exit 1

    - name: Create SSH User
      run: |
        sudo useradd -m -s /bin/bash Mudassir7771
        echo "Mudassir7771:Killeryt77719" | sudo chpasswd
        sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        sleep 2

    - name: Start WebSocket Bridge
      run: |
        WS=$(which websockify || find / -name websockify 2>/dev/null | head -1)
        echo "Using: $WS"
        sudo $WS 8080 127.0.0.1:22 &
        sleep 3
        ss -tlnp | grep 8080 && echo "WS Bridge OK" || echo "WS FAILED"

    - name: Generate SSH Key
      run: |
        ssh-keygen -t rsa -b 2048 -f /tmp/id_rsa -N "" -q
        echo "Key generated"

    - name: Start serveo tunnel
      run: |
        nohup ssh -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=30 \
          -o ExitOnForwardFailure=yes \
          -i /tmp/id_rsa \
          -R 80:localhost:8080 \
          serveo.net \
          > /tmp/serveo.log 2>&1 &
        sleep 12
        cat /tmp/serveo.log

    - name: Print Connection Info
      run: |
        HOST=$(grep -o '[a-zA-Z0-9-]*\.serveo\.net' /tmp/serveo.log | head -1)
        echo "=================================="
        echo "       SSH-WS CONNECTION INFO     "
        echo "=================================="
        echo ""
        echo "  Host     : $HOST"
        echo "  Port     : 443"
        echo "  Username : Mudassir7771"
        echo "  Password : Killeryt77719"
        echo ""
        echo "  Target:"
        echo "  $HOST:443@Mudassir7771:Killeryt77719"
        echo ""
        echo "  Proxy: jazz.com.pk:80"
        echo ""
        echo "  Payload:"
        echo "  GET wss://$HOST/ HTTP/1.1[crlf]Host:$HOST[crlf]Upgrade: Websocket[crlf]Connection: Keep-Alive[crlf][crlf]"
        echo ""
        echo "=================================="

    - name: Keep Alive
      run: sleep 19800
