name: SSH-WS Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  sshws:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Install Packages
      run: |
        sudo apt update -y
        sudo apt install -y openssh-server stunnel4 curl wget python3 python3-pip
        pip3 install websockify

    - name: Create SSH User
      run: |
        sudo useradd -m -s /bin/bash ${{ secrets.SSH_USER }}
        echo "${{ secrets.SSH_USER }}:${{ secrets.SSH_PASSWORD }}" | sudo chpasswd
        sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh

    - name: Generate SSL Certificate
      run: |
        openssl req -x509 -nodes -newkey rsa:2048 -keyout /tmp/server.key -out /tmp/server.crt -days 1 -subj "/CN=tunnel"
        cat /tmp/server.key /tmp/server.crt > /tmp/server.pem

    - name: Start WebSocket Bridge
      run: nohup websockify 0.0.0.0:8080 localhost:22 > /tmp/ws.log 2>&1 &

    - name: Setup stunnel
      run: |
        echo "[ws-ssl]" | sudo tee /etc/stunnel/stunnel.conf
        echo "accept = 443" | sudo tee -a /etc/stunnel/stunnel.conf
        echo "connect = 127.0.0.1:8080" | sudo tee -a /etc/stunnel/stunnel.conf
        echo "cert = /tmp/server.pem" | sudo tee -a /etc/stunnel/stunnel.conf
        sudo stunnel /etc/stunnel/stunnel.conf
        sleep 2

    - name: Install ngrok
      run: |
        curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update -q && sudo apt install -y ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

    - name: Start ngrok
      run: |
        nohup ngrok tcp 443 --log stdout > /tmp/ngrok.log 2>&1 &
        sleep 6

    - name: Print Info
      run: |
        curl -s http://localhost:4040/api/tunnels | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        for t in data['tunnels']:
            addr = t['public_url'].replace('tcp://','')
            host, port = addr.split(':')
            print('Host :', host)
            print('Port :', port)
        "
        echo "User : ${{ secrets.SSH_USER }}"
        echo "Pass : ${{ secrets.SSH_PASSWORD }}"

    - name: Keep Alive
      run: sleep 19800
