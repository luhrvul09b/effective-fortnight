name: SSH-WS Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  sshws:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Install Packages
      run: |
        sudo apt update -y
        sudo apt install -y openssh-server curl wget python3 python3-pip
        sudo pip3 install websockify --break-system-packages

    - name: Create SSH User
      run: |
        sudo useradd -m -s /bin/bash Mudassir7771
        echo "Mudassir7771:Killeryt77719" | sudo chpasswd
        sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        sleep 2

    - name: Start WebSocket Bridge
      run: |
        WS=$(which websockify || find / -name websockify 2>/dev/null | head -1)
        sudo $WS 8080 127.0.0.1:22 &
        sleep 3
        ss -tlnp | grep 8080 && echo "WS OK"

    - name: Install bore
      run: |
        wget -q https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
        tar xzf bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
        sudo mv bore /usr/local/bin/
        bore --version && echo "bore OK"

    - name: Start bore tunnel
      run: |
        nohup bore local 8080 --to bore.pub > /tmp/bore.log 2>&1 &
        sleep 8
        cat /tmp/bore.log

    - name: Print Connection Info
      run: |
        PORT=$(grep -o 'listening at.*:[0-9]*' /tmp/bore.log | grep -o '[0-9]*$' | head -1)
        echo "=================================="
        echo "       SSH-WS CONNECTION INFO     "
        echo "=================================="
        echo ""
        echo "  Host     : bore.pub"
        echo "  Port     : $PORT"
        echo "  Username : Mudassir7771"
        echo "  Password : Killeryt77719"
        echo ""
        echo "  Target:"
        echo "  bore.pub:$PORT@Mudassir7771:Killeryt77719"
        echo ""
        echo "  Proxy: jazz.com.pk:80"
        echo ""
        echo "  [Port 80 Payload]"
        echo "  GET / HTTP/1.1[crlf]Host:bore.pub[crlf]Upgrade: Websocket[crlf]Connection: Keep-Alive[crlf][crlf]"
        echo ""
        echo "=================================="

    - name: Keep Alive
      run: sleep 19800
