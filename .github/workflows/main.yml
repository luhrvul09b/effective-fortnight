name: SSH-WS Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  sshws:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Install Packages
      run: |
        sudo apt update -y
        sudo apt install -y openssh-server curl wget python3 python3-pip
        pip3 install websockify

    - name: Create SSH User
      run: |
        sudo useradd -m -s /bin/bash Mudassir7771
        echo "Mudassir7771:Killeryt77719" | sudo chpasswd
        sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        sleep 2

    - name: Start WebSocket on port 80
      run: |
        sudo nohup websockify 0.0.0.0:80 localhost:22 > /tmp/ws.log 2>&1 &
        sleep 3
        echo "WebSocket status:"
        cat /tmp/ws.log

    - name: Install ngrok
      run: |
        curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update -q && sudo apt install -y ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

    - name: Start ngrok TCP on 80
      run: |
        nohup ngrok tcp 80 --log stdout > /tmp/ngrok.log 2>&1 &
        sleep 8

    - name: Print Connection Info
      run: |
        TUNNELS=$(curl -s http://localhost:4040/api/tunnels)
        HOST=$(echo $TUNNELS | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        for t in data['tunnels']:
            addr = t['public_url'].replace('tcp://','')
            print(addr.split(':')[0])
        ")
        PORT=$(echo $TUNNELS | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        for t in data['tunnels']:
            addr = t['public_url'].replace('tcp://','')
            print(addr.split(':')[1])
        ")
        echo "=================================="
        echo "       SSH-WS CONNECTION INFO     "
        echo "=================================="
        echo ""
        echo "  Host     : $HOST"
        echo "  Port     : $PORT"
        echo "  Username : Mudassir7771"
        echo "  Password : Killeryt77719"
        echo "  SSL/TLS  : OFF (WS only)"
        echo ""
        echo "  DarkTunnel Target:"
        echo "  $HOST:$PORT@Mudassir7771:Killeryt77719"
        echo ""
        echo "  Payload:"
        echo "  GET / HTTP/1.1[crlf]Host:$HOST[crlf]Upgrade: websocket[crlf]Connection: Keep-Alive[crlf][crlf]"
        echo ""
        echo "=================================="

    - name: Keep Alive
      run: sleep 19800
