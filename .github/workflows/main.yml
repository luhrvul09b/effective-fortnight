name: SSH-WS Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  sshws:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Install Packages
      run: |
        sudo apt update -y
        sudo apt install -y openssh-server curl wget python3 python3-pip
        pip3 install websockify

    - name: Create SSH User
      run: |
        sudo useradd -m -s /bin/bash Mudassir7771
        echo "Mudassir7771:Killeryt77719" | sudo chpasswd
        sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        sleep 2

    - name: Start WebSocket Bridge
      run: |
        sudo nohup websockify 0.0.0.0:8080 localhost:22 > /tmp/ws.log 2>&1 &
        sleep 3

    - name: Install ngrok
      run: |
        curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update -q && sudo apt install -y ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

    - name: Start ngrok HTTP
      run: |
        nohup ngrok http 8080 --log stdout > /tmp/ngrok.log 2>&1 &
        sleep 8

    - name: Print Connection Info
      run: |
        TUNNELS=$(curl -s http://localhost:4040/api/tunnels)
        HOST=$(echo $TUNNELS | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        for t in data['tunnels']:
            if t['proto'] == 'https':
                url = t['public_url'].replace('https://','')
                print(url)
                break
        ")
        echo "=================================="
        echo "       SSH-WS CONNECTION INFO     "
        echo "=================================="
        echo ""
        echo "  Host     : $HOST"
        echo "  Port     : 443"
        echo "  Username : Mudassir7771"
        echo "  Password : Killeryt77719"
        echo ""
        echo "  Target:"
        echo "  $HOST:443@Mudassir7771:Killeryt77719"
        echo ""
        echo "  Proxy: jazz.com.pk:80"
        echo ""
        echo "  Payload:"
        echo "  GET wss://$HOST/ HTTP/1.1[crlf]Host:$HOST[crlf]Upgrade: Websocket[crlf]Connection: Keep-Alive[crlf][crlf]"
        echo ""
        echo "=================================="

    - name: Keep Alive
      run: sleep 19800
