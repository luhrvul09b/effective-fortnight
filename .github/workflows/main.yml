name: V2ray Test
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 🛠️ Set up Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y expect jq curl sqlite3
        
    - name: ⚙️ Install X-UI
      run: |
        wget https://raw.githubusercontent.com/alireza0/x-ui/master/install.sh
        
        cat << 'EOF' > setup.exp
        set timeout -1
        spawn sudo bash install.sh
        expect {
            "*customize*" { send "y\r"; exp_continue }
            "*port:*" { send "54321\r"; exp_continue }
            eof
        }
        EOF
        expect setup.exp
        
    - name: 🔓 Reset Credentials & Remove WebBasePath
      run: |
        # Force standard credentials to avoid random login issues
        sudo sqlite3 /etc/x-ui/x-ui.db "UPDATE users SET username = 'admin', password = 'admin123' WHERE id = 1;"
        sudo sqlite3 /etc/x-ui/x-ui.db "UPDATE settings SET value = '' WHERE key = 'webBasePath';"
        
        sudo systemctl restart x-ui
        sleep 5
        
    - name: 🌐 Run Ngrok in TCP Mode
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y
        
        ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
        
        # Start Ngrok using TCP instead of HTTP to bypass the warning screen entirely
        ngrok tcp 54321 > /dev/null 2>&1 &
        sleep 10
        
    - name: 📋 Display Panel Details
      run: |
        # Fetch the raw TCP URL
        RAW_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        
        if [ "$RAW_URL" == "null" ] || [ -z "$RAW_URL" ]; then
          echo "❌ ERROR: Ngrok failed to generate a URL. Please double-check your NGROK_TOKEN secret."
          exit 1
        fi
        
        # Convert "tcp://" to "http://" so you can click it in the browser
        CLEAN_URL="${RAW_URL/tcp:\/\//http:\/\/}"
        
        echo "====================================================="
        echo "✅ SUCCESS! Aapka X-UI Panel yahan open hoga:"
        echo "🔗 Link: $CLEAN_URL/"
        echo "👤 Username: admin"
        echo "🔑 Password: admin123"
        echo "====================================================="
        
    - name: ⏳ Keep-Alive Timer
      run: |
        echo "⏳ Server chal raha hai... Isko band karne ke liye 'Cancel Workflow' par click karein."
        sleep 6h
