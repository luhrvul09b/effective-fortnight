    - name: Install X-UI & Ngrok
      run: |
        # X-UI Panel ko sudo (root) ke sath chalayein
        sudo bash -c "$(curl -Ls https://raw.githubusercontent.com/alireza0/x-ui/master/install.sh)" <<EOF
        y
        admin
        admin123
        54321
        EOF
        
        # Ngrok Install karna
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok
        
        # Ngrok ko authenticate karein
        ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
        
        # X-UI ke port (54321) ko public internet par forward karein
        ngrok http 54321 --log=stdout
