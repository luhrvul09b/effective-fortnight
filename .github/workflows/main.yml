name: SSH-WS Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  sshws:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Install Packages
      run: |
        sudo apt update -y
        sudo apt install -y openssh-server curl wget python3 python3-pip dropbear
        pip3 install websockify

    - name: Create SSH User
      run: |
        sudo useradd -m -s /bin/bash Mudassir7771
        echo "Mudassir7771:Killeryt77719" | sudo chpasswd
        sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        sleep 2

    - name: Start Dropbear on port 2222
      run: |
        sudo dropbear -p 2222 -s -g 2>/dev/null || true
        sleep 2

    - name: Start websockify port 8080 to SSH
      run: |
        sudo nohup websockify --log-file=/tmp/ws.log 8080 127.0.0.1:22 &
        sleep 3
        echo "WS Log:"
        cat /tmp/ws.log || true

    - name: Verify websockify running
      run: |
        ss -tlnp | grep 8080 && echo "websockify OK" || echo "websockify FAILED"
        ss -tlnp | grep 22 && echo "SSH OK" || echo "SSH FAILED"

    - name: Install Cloudflare Tunnel
      run: |
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

    - name: Start Cloudflare Tunnel
      run: |
        nohup cloudflared tunnel --url http://localhost:8080 --no-autoupdate > /tmp/cf.log 2>&1 &
        echo "Waiting for tunnel..."
        for i in {1..30}; do
          URL=$(grep -o 'https://[a-zA-Z0-9.-]*trycloudflare\.com' /tmp/cf.log | head -1)
          if [ ! -z "$URL" ]; then
            echo "Tunnel ready: $URL"
            break
          fi
          sleep 2
        done

    - name: Print Connection Info
      run: |
        HOST=$(grep -o 'https://[a-zA-Z0-9.-]*trycloudflare\.com' /tmp/cf.log | head -1 | sed 's/https:\/\///')
        echo "=================================="
        echo "       SSH-WS CONNECTION INFO     "
        echo "=================================="
        echo ""
        echo "  Host     : $HOST"
        echo "  Port     : 443"
        echo "  Username : Mudassir7771"
        echo "  Password : Killeryt77719"
        echo ""
        echo "  Target:"
        echo "  $HOST:443@Mudassir7771:Killeryt77719"
        echo ""
        echo "  Proxy: jazz.com.pk:80"
        echo ""
        echo "  Payload:"
        echo "  GET wss://$HOST/ HTTP/1.1[crlf]Host:$HOST[crlf]Upgrade: Websocket[crlf]Connection: Keep-Alive[crlf][crlf]"
        echo ""
        echo "=================================="
        echo ""
        echo "CF Log tail:"
        tail -20 /tmp/cf.log

    - name: Keep Alive
      run: sleep 19800
