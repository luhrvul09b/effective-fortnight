name: SSH WebSocket Proxy
on:
  workflow_dispatch: # Isse aap manually run kar sakenge

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Cloudflared & Create User
      run: |
        # cloudflared (Cloudflare Tunnel) install karein
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        
        # Test SSH user banayein (Username: yomi, Password: password123)
        sudo useradd -m -s /bin/bash yomi
        echo "yomi:password123" | sudo chpasswd

    - name: Download and Start SSH WS Proxy
      run: |
        # Python WebSocket proxy script download karein
        wget https://raw.githubusercontent.com/rerechan02/vps/main/ssh/ws-uat.py
        
        # Isko background mein port 8080 par chalaein
        python3 ws-uat.py --port 8080 &

    - name: Start Cloudflare Quick Tunnel
      run: |
        # Bina domain ke free tunnel start karein jo port 8080 ko forward karega
        ./cloudflared tunnel --url http://localhost:8080
