name: Ubuntu Remote SSH Terminal

on:
  workflow_dispatch: 

jobs:
  run-ubuntu:
    runs-on: ubuntu-22.04 # Changed to 22.04 taake queue me stuck na ho
    steps:
    - name: System Update & Install SSH
      run: |
        sudo apt update
        sudo apt install -y openssh-server jq
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        echo "root:vpspass" | sudo chpasswd
        sudo service ssh restart

    - name: Download and Install Ngrok
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update && sudo apt install ngrok -y

    - name: Connect Ngrok & Show SSH Command
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      run: |
        ngrok config add-authtoken $NGROK_AUTH_TOKEN
        ngrok tcp 22 --log=stdout > ngrok.log &
        
        # Tunnel start hone ka thoda wait krte hain
        sleep 10
        
        # Ngrok URL nikalna
        URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        
        # Agar token galat ho ya ngrok fail ho jaye to script ruk jayegi aur error dikhayegi
        if [ -z "$URL" ] || [ "$URL" == "null" ]; then
          echo "Ngrok Error: Token sahi nahi ha ya Ngrok limit hit ho gayi ha."
          cat ngrok.log
          exit 1
        fi
        
        # Host aur Port alag krna
        HOST=$(echo $URL | sed 's/tcp:\/\///' | cut -d':' -f1)
        PORT=$(echo $URL | sed 's/tcp:\/\///' | cut -d':' -f2)
        
        # Terminal Logs me clear dikhane ke liye
        echo "=========================================="
        echo "🎉 VPS READY! CONNECT USING THIS COMMAND:"
        echo "ssh root@$HOST -p $PORT"
        echo "Password: vpspass"
        echo "=========================================="
        
        # GitHub Actions ki Summary screen pr print krne ke liye
        echo "### 🚀 Aapka Ubuntu 22.04 VPS Ready Ha!" >> $GITHUB_STEP_SUMMARY
        echo "Apne Termux ya terminal me ye command lagayein:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "ssh root@$HOST -p $PORT" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "**Password:** \`vpspass\`" >> $GITHUB_STEP_SUMMARY

    - name: Keep Alive (6 Hours)
      run: |
        # Container ko active rakhne ke liye 6 ghante ka loop
        sleep 21600
