name: SSH-WS Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  sshws:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Install Packages
      run: |
        sudo apt update -y
        sudo apt install -y openssh-server curl wget python3 python3-pip
        pip3 install asyncio websockets

    - name: Create SSH User
      run: |
        sudo useradd -m -s /bin/bash Mudassir7771
        echo "Mudassir7771:Killeryt77719" | sudo chpasswd
        sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        sleep 2

    - name: Create WebSocket Bridge Script
      run: |
        cat > /tmp/ws_bridge.py << 'PYEOF'
        import asyncio
        import websockets
        import socket

        async def handle(ws):
            try:
                reader, writer = await asyncio.open_connection('127.0.0.1', 22)
                async def ws_to_ssh():
                    try:
                        async for msg in ws:
                            if isinstance(msg, bytes):
                                writer.write(msg)
                            else:
                                writer.write(msg.encode())
                            await writer.drain()
                    except:
                        pass
                async def ssh_to_ws():
                    try:
                        while True:
                            data = await reader.read(4096)
                            if not data:
                                break
                            await ws.send(data)
                    except:
                        pass
                await asyncio.gather(ws_to_ssh(), ssh_to_ws())
            except Exception as e:
                print(f"Error: {e}")
            finally:
                try:
                    writer.close()
                except:
                    pass

        async def main():
            async with websockets.serve(handle, '0.0.0.0', 8080):
                print("WS Bridge running on 8080")
                await asyncio.Future()

        asyncio.run(main())
        PYEOF
        echo "Script created"

    - name: Start WebSocket Bridge
      run: |
        nohup python3 /tmp/ws_bridge.py > /tmp/ws.log 2>&1 &
        sleep 3
        ss -tlnp | grep 8080 && echo "Bridge OK" || echo "Bridge FAILED"
        cat /tmp/ws.log

    - name: Install Cloudflare Tunnel
      run: |
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

    - name: Start Cloudflare Tunnel
      run: |
        nohup cloudflared tunnel --url http://localhost:8080 --no-autoupdate > /tmp/cf.log 2>&1 &
        for i in {1..30}; do
          URL=$(grep -o 'https://[a-zA-Z0-9.-]*trycloudflare\.com' /tmp/cf.log | head -1)
          if [ ! -z "$URL" ]; then
            echo "Tunnel ready: $URL"
            break
          fi
          sleep 2
        done

    - name: Print Connection Info
      run: |
        HOST=$(grep -o 'https://[a-zA-Z0-9.-]*trycloudflare\.com' /tmp/cf.log | head -1 | sed 's/https:\/\///')
        echo "=================================="
        echo "       SSH-WS CONNECTION INFO     "
        echo "=================================="
        echo ""
        echo "  Host     : $HOST"
        echo "  Port     : 443"
        echo "  Username : Mudassir7771"
        echo "  Password : Killeryt77719"
        echo ""
        echo "  Target:"
        echo "  $HOST:443@Mudassir7771:Killeryt77719"
        echo ""
        echo "  Proxy: jazz.com.pk:80"
        echo ""
        echo "  Payload:"
        echo "  GET wss://$HOST/ HTTP/1.1[crlf]Host:$HOST[crlf]Upgrade: Websocket[crlf]Connection: Keep-Alive[crlf][crlf]"
        echo ""
        echo "=================================="

    - name: Keep Alive
      run: sleep 19800
