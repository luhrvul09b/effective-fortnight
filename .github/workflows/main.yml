name: Launch Live Ngrok Proxy Server

on:
  workflow_dispatch: # Isse aap manually web par ek click se server start kar sakte hain

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install High-Performance Dependencies
        run: |
          pip install fastapi uvicorn httpx pyngrok

      - name: Create Python Proxy Script On The Fly
        run: |
          cat << 'EOF' > proxy_server.py
          import httpx
          from fastapi import FastAPI, Request, HTTPException
          from fastapi.middleware.cors import CORSMiddleware
          from fastapi.responses import StreamingResponse

          app = FastAPI()

          app.add_middleware(
              CORSMiddleware,
              allow_origins=["*"],
              allow_credentials=True,
              allow_methods=["*"],
              allow_headers=["*"],
          )

          @app.api_route("/proxy", methods=["POST", "OPTIONS"])
          async def proxy_gateway(request: Request):
              if request.method == "OPTIONS":
                  return {"status": "ok"}

              target_url = request.headers.get("X-Target-URL")
              if not target_url:
                  raise HTTPException(status_code=400, detail="Missing X-Target-URL Header")

              forward_headers = {}
              headers_to_check = ["authorization", "content-type", "x-api-key", "anthropic-version", "x-goog-api-key"]
              
              for key, value in request.headers.items():
                  if key.lower() in headers_to_check:
                      forward_headers[key.lower()] = value

              body_bytes = await request.body()

              async def stream_generator():
                  timeout = httpx.Timeout(60.0, connect=10.0)
                  async with httpx.AsyncClient(timeout=timeout) as client:
                      try:
                          async with client.stream("POST", target_url, headers=forward_headers, content=body_bytes) as response:
                              async for chunk in response.aiter_bytes():
                                  yield chunk
                      except Exception as exc:
                          yield f"data: {{\"error\": \"{str(exc)}\"}}\n\n".encode('utf-8')

              return StreamingResponse(stream_generator(), media_type="text/event-stream")

          if __name__ == "__main__":
              import uvicorn
              uvicorn.run(app, host="127.0.0.1", port=8000)
          EOF

      - name: Start Proxy Server and Ngrok Tunnel
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          python -c "
          from pyngrok import ngrok
          import subprocess
          import time

          # 1. Authenticate ngrok using GitHub Secret
          ngrok.set_auth_token('$NGROK_TOKEN')

          # 2. Fire up the local FastAPI Python server in background
          proc = subprocess.Popen(['python', 'proxy_server.py'])
          time.sleep(3) # Let server initialize

          # 3. Create the public live ngrok tunnel pointing to local server
          public_url = ngrok.connect(8000, bind_tls=True)
          
          print('\n' + '='*60)
          print('🚀 TSCOOP PROXY SERVER IS LIVE!')
          print(f'🔗 TARGET BYPASS URL: {public_url.public_url}/proxy')
          print('='*60 + '\n')

          # Keep the process locked open so the action runner doesn't stop
          try:
              while proc.poll() is None:
                  time.sleep(5)
          except KeyboardInterrupt:
              pass
          "
